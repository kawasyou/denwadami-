<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>電話シミュレーター</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* iPadサイズ */
.phone {
  width: 768px;
  height: 1024px;
  background: black;
  border-radius: 40px;
  overflow: hidden;
  color: white;
  display: flex;
  flex-direction: column;
}

/* 上部表示 */
.display {
  height: 160px;
  font-size: 48px;
  text-align: center;
  line-height: 160px;
}

/* 通話画面 */
.call-screen {
  display: none;
  text-align: center;
  flex: 1;
}

.call-number {
  font-size: 60px;
  margin-top: 250px;
}

.call-status {
  color: #aaa;
  margin: 30px 0;
  font-size: 20px;
}

.end-btn {
  background: #ff3b30;
  border-radius: 50%;
  width: 100px;
  height: 100px;
  border: none;
  color: white;
  font-size: 20px;
}

/* ボタン */
.buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  padding: 40px;
}

.key {
  height: 120px;
  border-radius: 50%;
  background: #333;
  color: white;
  font-size: 32px;
  border: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.key small {
  font-size: 14px;
  color: #aaa;
}

.call {
  background: #34c759;
  grid-column: span 3;
  border-radius: 50px;
  height: 90px;
  font-size: 28px;
}

.clear {
  background: #555;
  grid-column: span 3;
  border-radius: 50px;
  height: 80px;
  font-size: 24px;
}
</style>

</head>
<body>

<div class="phone">

  <div id="dialScreen">
    <div class="display" id="display"></div>

    <div class="buttons">
      <button class="key" onclick="add('1')">1</button>
      <button class="key" onclick="add('2')">2<small>ABC</small></button>
      <button class="key" onclick="add('3')">3<small>DEF</small></button>

      <button class="key" onclick="add('4')">4<small>GHI</small></button>
      <button class="key" onclick="add('5')">5<small>JKL</small></button>
      <button class="key" onclick="add('6')">6<small>MNO</small></button>

      <button class="key" onclick="add('7')">7<small>PQRS</small></button>
      <button class="key" onclick="add('8')">8<small>TUV</small></button>
      <button class="key" onclick="add('9')">9<small>WXYZ</small></button>

      <button class="key" onclick="add('*')">*</button>

      <button class="key"
        onmousedown="startHold()"
        onmouseup="endHold()"
        onmouseleave="endHold()"
        onclick="add('0')">
        0<small>+</small>
      </button>

      <button class="key" onclick="add('#')">#</button>

      <button class="call" onclick="call()">発信</button>
      <button class="clear" onclick="clearDisplay()">クリア</button>
    </div>
  </div>

  <div id="callScreen" class="call-screen">
    <div class="call-number" id="callNumber"></div>
    <div class="call-status">発信中...</div>
    <button class="end-btn" onclick="endCall()">終了</button>
  </div>

</div>

<audio id="sound" src="1.mp3"></audio>

<script>
let number = "";
let holdTimer = null;

function add(n) {
  number += n;
  update();
}

function update() {
  document.getElementById("display").textContent = number;
}

function clearDisplay() {
  number = "";
  update();
}

function startHold() {
  holdTimer = setTimeout(() => {
    number += "+";
    update();
  }, 600);
}

function endHold() {
  clearTimeout(holdTimer);
}

function call() {
  if (!number) return alert("番号を入力してください");

  document.getElementById("sound").play();

  document.getElementById("dialScreen").style.display = "none";
  document.getElementById("callScreen").style.display = "block";
  document.getElementById("callNumber").textContent = number;
}

function endCall() {
  document.getElementById("callScreen").style.display = "none";
  document.getElementById("dialScreen").style.display = "block";
}
</script>

</body>
</html>
